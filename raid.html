<!DOCTYPE html>
<html>
<head>
  <title>Highrise - Raid Details</title>

  <style>
    body {
        font-family: Arial;
        background: #121212;
        color: #eee;
    }

    h1, h2 {
        color: #ffcc00;
    }

    nav {
        margin-bottom: 20px;
    }

    a {
        color: #ffcc00;
        margin-right: 10px;
        text-decoration: none;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
    }


    #table th {
        font-size: 20px;
    }
    #table td {
        font-size: 18px;
    }


    th, td {
        padding: 3px;
        border-bottom: 4px solid #333;
        border-right: 4px solid #333;
        text-align: left;
        white-space: nowrap;
    }
    
    th.center-col,
    td.center-col {
        text-align: center;
    }

    #controls {
        margin: 15px 0;
    }

    #bossContainer {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 14px;
        margin-bottom: 15px;
    }

    .boss-group {
        background: #1b1b1b;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #333;
        text-align: center;
    }

    .boss-group-title {
        font-size: 14px;
        font-weight: bold;
        color: #ffcc00;
        margin-bottom: 8px;
        text-align: center;
    }

    .boss-button-grid {
        display: flex;
        flex-direction: column;
        gap: 6px;
    }

    .boss-button {
        width: 100%;
        padding: 8px;
        border: 1px solid #555;
        background: #2b2b2b;
        color: #eee;
        cursor: pointer;
        border-radius: 6px;
        text-align: center;
    }

    .boss-button.active {
        background: #ffcc00;
        color: black;
        font-weight: bold;
    }

    #levelContainer {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(80px, 100px));
        gap: 8px;
        margin-bottom: 15px;
    }

    #levelContainer .boss-button {
        width: auto;
        min-width: 80px;
        text-align: center;
        padding: 6px 8px;
        font-size: 13px;
    }

    button {
        padding: 6px 10px;
        margin-right: 8px;
        border: 1px solid #555;
        background: #2b2b2b;
        color: #eee;
        cursor: pointer;
        border-radius: 6px;
    }

    button:hover {
        background: #3a3a3a;
    }

    .filter-header {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-top: 15px;
        margin-bottom: 8px;
    }

    .filter-header h3 {
        margin: 0;
        color: #ffcc00;
    }

    .filter-actions button {
        margin-left: 6px;
        padding: 5px 10px;
        border: 1px solid #555;
        background: #2b2b2b;
        color: #eee;
        cursor: pointer;
        border-radius: 6px;
    }

    .filter-actions button:hover {
        background: #3a3a3a;
    }

    .filter-actions {
        display: flex;
        gap: 6px;
    }

    #playerSearch {
        padding: 5px 8px;
        margin-left: 5px;
        border-radius: 4px;
        border: 1px solid #555;
        background: #1b1b1b;
        color: #eee;
    }

    .team-img {
        width: 40px;
        height: 40px;
        object-fit: cover;
        border-radius: 6px;
        border: 1px solid #444;

        transition:
            transform 0.18s cubic-bezier(0.4, 0, 0.2, 1),
            border-color 0.18s ease,
            box-shadow 0.18s ease;
    }

    .team-img:hover {
        transform: scale(1.15);
        border-color: #ffffff;
        box-shadow: 0 0 6px rgba(255, 204, 0, 0.4);
    }

    .collapsible {
        border: 1px solid #333;
        border-radius: 8px;
        background: #1b1b1b;
        margin-bottom: 15px;
        overflow: hidden;
    }

    .collapsible-header {
        cursor: pointer;
        background: #1b1b1b;
        padding: 12px;
        display: flex;
        align-items: center;
        border: 0px solid #333;
        border-radius: 6px;
        justify-content: space-between;
    }
/*
    .collapsible-header:hover {
        background: #2a2a2a;
    }
*/    
    .collapsible-content {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.25s ease;
        padding: 0 10px;
    }

    .collapsible-content:empty {
        padding: 0;
    }

    .collapsible-content.active {
        max-height: 2000px; 
        padding: 10px;
    }

    .collapsible-header h3 {
        margin: 0;
        font-size: 18px;
    }

    .collapsible-header:hover .arrow {
        transform: scale(1.1);
    }

    .arrow {
        transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        transform-origin: center;
    }
    
    .team-img:active {
        transform: scale(1.05);
    }

    td img {
        display: block;
    }

    .control-row {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 15px;
    }

    select {
        padding: 6px 10px;
        border-radius: 6px;
        border: 1px solid #555;
        background: #1b1b1b;
        color: #eee;
        font-size: 14px;
        cursor: pointer;
    }

    select:focus {
        outline: none;
        border-color: #ffcc00;
    }

    select:hover {
        border-color: #777;
    }

    .checkbox {
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
    }
    
    .checkbox:hover span {
        color: #0400ff;
    }

    .checkbox input {
        accent-color: #ffcc00;
        width: 16px;
        height: 16px;
        cursor: pointer;
    }
    
    #controls > *:first-child {
        margin-bottom: 15px;
    }

    .num-col {
        text-align: right;
        padding-right: 12px;
    }

    .name-col {
        text-align: left;
        padding-left: 12px;
    }

    .kill {
        color: #ff0000;
        /* font-weight: bold; */
        text-shadow: 0 0 6px #9b0000
    }

    .normal-mode {
        background-color: rgba(3, 1, 124, 0.301);
    }

    .normal-mode:hover {
        background-color: rgba(255, 255, 255, 0.08);
    } 

    #table tr:not(:first-child):hover {
        background-color: rgba(255, 255, 255, 0.06);
        transition: background-color 0.10s ease;
    }
    
    .center-col {
        text-align: center;
    }

    .team-col {
        width: 1%;
        text-align: center;
        white-space: nowrap;
        padding-left: 8px;
        padding-right: 8px;

    }

    .team-wrapper {
        display: inline-flex;
        gap: 8px;
        align-items: center;
    }

  </style>
</head>

<body>

<nav>
    <a href="index.html">Overview</a>|
    <a href="raid.html">Union Raid</a>|
    <a href="player.html">Players</a>|
    <a href="boss.html">Bosses</a>|
    <a href="leaderboard.html">Leaderboard</a>
</nav>

<h1>Union Raid Detailed View</h1>

<div class="control-row">

    <label style="margin-left:20px">Raid:
        <select id="raidSelect"></select>
    </label>

    <label class="checkbox">
        <input type="checkbox" id="includeNormal">
        <span>Include Normal Mode</span>
    </label>
</div>

    <div class="collapsible">
        <div class="collapsible-header" onclick="toggleSection('bossFilters')">
            <h3>Filters</h3>
            <span class="arrow">▼</span>
        </div>

        <div id="bossFilters" class="collapsible-content">

            <div class="filter-header">
            <h3>Bosses</h3>
            <div class="filter-actions">
                <button id="selectAllBosses">Select All</button>
                <button id="clearBosses">Clear</button>
            </div>
            </div>

            <div id="bossContainer"></div>

            <!-- ✅ Boss Level -->
            <div class="filter-header" style="margin-top:15px;">
            <h3>Level</h3>
            <div class="filter-actions">
                <button id="selectAllLevels">Select All</button>
                <button id="clearLevels">Clear</button>
            </div>
            </div>

            <div id="levelContainer"></div>

        </div>
    </div>

<!-- <h2>Attempts</h2>  -->
<label style="margin-left:20px;">
  Search:
  <input type="text" id="playerSearch" placeholder="Player, boss, team...">
</label>
<table id="table"></table>



<script>

let selectedBosses = new Set();
let selectedLevels = new Set();
let rawData = [];
let currentSort = {
  column: null,
  direction: 'desc'
};


// Fetcher

fetch('raid_data.json')
    .then(res => res.json())
    .then(data => {
        rawData = data;

    return fetch('nikke.json');
    })
    .then(res => res.json())
    .then(unitData => {
        units = unitData;

    populateRaidDropdown();
    populateBossButtons();
    populateLevelButtons();
    render();
  });



// Listeners

    document.getElementById("raidSelect").addEventListener("change", () => {
    populateBossButtons();
    populateLevelButtons();
    render();
    });

    document.getElementById("includeNormal").addEventListener("change", () => {
    populateBossButtons();
    populateLevelButtons();
    render();
    });

    // adds filter control logic to select all bosses
    document.getElementById("selectAllBosses").addEventListener("click", () => {

    const buttons = document.querySelectorAll("#bossContainer .boss-button");

    selectedBosses.clear();

    buttons.forEach(btn => {
        const boss = btn.textContent;
        const group = btn.closest('.boss-group');
        const weakness = group.querySelector('.boss-group-title').textContent.replace(" Weak", "");

        selectedBosses.add(`${boss}|${weakness}`);
        btn.classList.add("active");
    });

    populateLevelButtons();
    render();
    });


    // adds filter control logic to clear any selected bosses
    document.getElementById("clearBosses").addEventListener("click", () => {

    selectedBosses.clear();

    document.querySelectorAll("#bossContainer .boss-button").forEach(btn => {
        btn.classList.remove("active");
    });

    populateLevelButtons();
    render();
    });


    // adds filter control logic to select all boss levels
    document.getElementById("selectAllLevels").addEventListener("click", () => {

    const buttons = document.querySelectorAll("#levelContainer .boss-button");

    selectedLevels.clear();

    buttons.forEach(btn => {
        const level = Number(btn.textContent.replace("Lv ", ""));
        selectedLevels.add(level);
        btn.classList.add("active");
    });

    render();
    });

    // adds filter control logic to clear any selected boss levels
    document.getElementById("clearLevels").addEventListener("click", () => {

    selectedLevels.clear();

    document.querySelectorAll("#levelContainer .boss-button").forEach(btn => {
        btn.classList.remove("active");
    });

    render();
    });

    // adds filter control for search box
    document.getElementById("playerSearch").addEventListener("input", render);

function render() {
    
    const searchValue = document
        .getElementById("playerSearch")
        .value
        .toLowerCase();
    const selectedLevelsActive = selectedLevels.size > 0;
    const selectedRaid = document.getElementById("raidSelect").value;
    const includeNormal = document.getElementById("includeNormal").checked;

    const selectedBossesActive = selectedBosses.size > 0;

    const filtered = rawData.filter(row => {

        const raidMatch =
        selectedRaid === "all" ||
        row.raidNumber == selectedRaid;

        const modeMatch =
        row.raidMode === "Hard" ||
        (includeNormal && row.raidMode === "Normal");

        const key = `${row.bossName}|${row.bossElementWeakness}`;

        const bossMatch =
        !selectedBossesActive ||
        selectedBosses.has(key);
        
        const levelMatch =
        !selectedLevelsActive ||
        selectedLevels.has(row.bossLevel);


        const searchMatch =
        searchValue === "" ||
        [
            row.playerName,
            row.bossName,
            row.bossElementWeakness,
            row.slot1,
            row.slot2,
            row.slot3,
            row.slot4,
            row.slot5
        ].some(value =>
            value &&
            value.toString().toLowerCase().includes(searchValue)
        );

        return raidMatch && modeMatch && bossMatch && levelMatch && searchMatch;
    });

if (currentSort.column) {
    filtered.sort((a, b) => {
        let valA = a[currentSort.column];
        let valB = b[currentSort.column];

        if (!isNaN(valA) && !isNaN(valB)) {
            valA = Number(valA);
            valB = Number(valB);
        } else {
            valA = (valA || '').toString().toLowerCase();
            valB = (valB || '').toString().toLowerCase();
        }

        if (valA < valB) return currentSort.direction === 'asc' ? -1 : 1;
        if (valA > valB) return currentSort.direction === 'asc' ? 1 : -1;

        // fallback grouping when clicked column values are equal:
        // Raid DESC -> Normal before Hard -> Boss Level ASC
        if (a.raidNumber !== b.raidNumber) {
            return Number(b.raidNumber) - Number(a.raidNumber);
        }

        const modeDiff = getModeSortValue(a.raidMode) - getModeSortValue(b.raidMode);
        if (modeDiff !== 0) {
            return modeDiff;
        }

        return Number(a.bossLevel) - Number(b.bossLevel);
    });

    } else {
    // Default table order:
    // Raid DESC -> Normal before Hard -> Boss Level ASC
    filtered.sort((a, b) => {
        if (a.raidNumber !== b.raidNumber) {
        return Number(b.raidNumber) - Number(a.raidNumber);
        }

        const modeDiff = getModeSortValue(a.raidMode) - getModeSortValue(b.raidMode);
        if (modeDiff !== 0) {
        return modeDiff;
        }

        return Number(a.bossLevel) - Number(b.bossLevel);
    });
} 

    function getSortArrow(column) {
    if (currentSort.column !== column) return '';
    return currentSort.direction === 'asc' ? ' ↑' : ' ↓';
    }

    let table = `
    <tr>
        <th onclick="sortTable('raidNumber')" class="center-col">Raid${getSortArrow('raidNumber')}</th>
        <th onclick="sortTable('playerName')" class="center-col">Player${getSortArrow('playerName')}</th>
        <th onclick="sortTable('synchroLevel')" class="center-col">Synchro${getSortArrow('synchroLevel')}</th>
        <th onclick="sortTable('totalDamage')" class="center-col">Damage${getSortArrow('totalDamage')}</th>
        <th onclick="sortTable('damagePerSynchro')" class="center-col">DPSL${getSortArrow('damagePerSynchro')}</th>
        <th class="team-col">Team Composition</th>
        <th onclick="sortTable('bossName')" class="center-col">Boss Name${getSortArrow('bossName')}</th>
        <th onclick="sortTable('bossLevel')" class="center-col">Boss Level${getSortArrow('bossLevel')}</th>
    </tr>
    `;


  filtered.forEach(row => {
    const dmg = Number(row.totalDamage) || 0;
    const dps = Number(row.damagePerSynchro) || 0;

    table += `
      <tr class="${row.raidMode === 'Normal' ? 'normal-mode' : ''}">
        <td class="center-col">${formatRaid(row.raidNumber)}</td>
        <td class="name-col">${row.playerName}</td>
        <td class="center-col">${row.synchroLevel || '-'}</td>
        <td class="num-col ${row.isKill === "TRUE" ? "kill" : ""}">
            ${dmg.toLocaleString()}
        </td>
        <td class="num-col">${dps.toLocaleString()}</td>
        <td class="team-col">
          ${renderTeam(row)}
        </td>
        <td class="name-col">${row.bossName}</td>
        <td class="center-col">${row.bossLevel || '-'}</td>
      </tr>
    `;
  });

  document.getElementById("table").innerHTML = table;

}

function populateRaidDropdown() {

    const select = document.getElementById("raidSelect");

    const raids = [...new Set(rawData.map(x => x.raidNumber))]
        .sort()
        .reverse();

    let options = `<option value="all">All Raids</option>`;

    raids.forEach(r => {
        options += `<option value="${r}">${r}</option>`;
    });

    select.innerHTML = options;
}


function populateBossButtons() {

    const container = document.getElementById("bossContainer");
    const selectedRaid = document.getElementById("raidSelect").value;

    container.innerHTML = "";

    const includeNormal = document.getElementById("includeNormal").checked;

    // Filter relevant rows first
    const relevantRows = rawData.filter(row => {

        const raidMatch =
        selectedRaid === "all" ||
        row.raidNumber == selectedRaid;

        const modeMatch =
        row.raidMode === "Hard" ||
        (includeNormal && row.raidMode === "Normal");

        

        return raidMatch && modeMatch;
    });

    // Group bosses by weakness
    const groups = {};

    relevantRows.forEach(row => {
        const weakness = row.bossElementWeakness || "Unknown";
        const boss = row.bossName;

        if (!groups[weakness]) {
        groups[weakness] = new Set();
        }

        groups[weakness].add(boss);
    });


    const validBosses = new Set(
        relevantRows.map(r => `${r.bossName}|${r.bossElementWeakness}`)
    );

    selectedBosses.forEach(b => {
        if (!validBosses.has(b)) {
            selectedBosses.delete(b);
        }
    });


    // Build UI
    Object.keys(groups).sort().forEach(weakness => {

        const groupDiv = document.createElement("div");
        groupDiv.className = "boss-group";

        const title = document.createElement("div");
        title.className = "boss-group-title";
        title.textContent = `${weakness} Weak`;

        groupDiv.appendChild(title);

        const grid = document.createElement("div");
        grid.className = "boss-button-grid";

        Array.from(groups[weakness]).sort().forEach(boss => {

        const btn = document.createElement("button");
        btn.className = "boss-button";
        btn.textContent = boss;

        const key = `${boss}|${weakness}`;

        if (selectedBosses.has(key)) {
            btn.classList.add("active");
        }

        btn.addEventListener("click", () => {

        const key = `${boss}|${weakness}`;

        if (selectedBosses.has(key)) {
            selectedBosses.delete(key);
            btn.classList.remove("active");
        } else {
            selectedBosses.add(key);
            btn.classList.add("active");
        }

            populateLevelButtons();
            render();
        });

        grid.appendChild(btn);
        });

        groupDiv.appendChild(grid);
        container.appendChild(groupDiv);
    });
    }



function populateLevelButtons() {

    const container = document.getElementById("levelContainer");
    const selectedRaid = document.getElementById("raidSelect").value;
    const includeNormal = document.getElementById("includeNormal").checked;

    container.innerHTML = "";

    // Start with rows matching raid + mode
    let candidateRows = rawData.filter(row => {
        const raidMatch =
        selectedRaid === "all" ||
        row.raidNumber == selectedRaid;

        const modeMatch =
        row.raidMode === "Hard" ||
        (includeNormal && row.raidMode === "Normal");

        return raidMatch && modeMatch;
    });

    // If bosses are selected, narrow levels to those bosses only
    if (selectedBosses.size > 0) {
        candidateRows = candidateRows.filter(row => {
        const key = `${row.bossName}|${row.bossElementWeakness}`;
        return selectedBosses.has(key);
        });
    }

    const availableLevels = [...new Set(
        candidateRows
        .map(row => row.bossLevel)
        .filter(level => level !== undefined && level !== null && level !== "")
    )].sort((a, b) => Number(a) - Number(b));

    // Remove any selected levels that are no longer valid
    selectedLevels.forEach(level => {
        if (!availableLevels.includes(level)) {
        selectedLevels.delete(level);
        }
    });

    availableLevels.forEach(level => {
        const btn = document.createElement("button");
        btn.className = "boss-button";
        btn.textContent = `Lv ${level}`;

        if (selectedLevels.has(level)) {
        btn.classList.add("active");
        }

        btn.addEventListener("click", () => {
        if (selectedLevels.has(level)) {
            selectedLevels.delete(level);
            btn.classList.remove("active");
        } else {
            selectedLevels.add(level);
            btn.classList.add("active");
        }

        render();
        });

        container.appendChild(btn);
    });
}

function sortTable(column) {

    if (currentSort.column === column) {
        // Toggle direction
        currentSort.direction =
        currentSort.direction === 'asc' ? 'desc' : 'asc';
    } else {
        currentSort.column = column;
        currentSort.direction = 'desc';
    }

    render();
}

function formatRaid(raidNumber) {
    
    if (!raidNumber) return '-';
    const str = raidNumber.toString();

    if (str.length !== 4) return str; // fallback if unexpected format
    const year = str.slice(0, 2);
    const month = str.slice(2, 4);

    return `${year}-${month}`;
}

function getUnit(name) {
    return units.find(u => u.nikkeName === name);
}

function renderTeam(row) {
    const slots = [
        row.slot1,
        row.slot2,
        row.slot3,
        row.slot4,
        row.slot5
    ];

    
    return `
    <div class="team-wrapper">
      ${slots.map(name => {
        if (!name) return "";

        const unit = getUnit(name);
        if (!unit) return name;

        return `
          <img src="${unit.nikkeImage}" class="team-img" title="${name}">
        `;
      }).join("")}
    </div>
  `;
}


function toggleSection(id) {
    const section = document.getElementById(id);
    const header = section.previousElementSibling;
    const arrow = header.querySelector('.arrow');
    section.classList.toggle("active");

    if (section.classList.contains("active")) {
        arrow.style.transform = "rotate(180deg) scale(1.1)";
    } else {
        arrow.style.transform = "rotate(0deg) scale(1)";
    }
}

function getModeSortValue(mode) {
    return mode === "Normal" ? 0 : 1;
}



</script>

</body>
</html>
