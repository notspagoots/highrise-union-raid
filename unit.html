
<!DOCTYPE html>
<html>
<head>
  <title>Unit Details</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">

  <style>
    body {
        font-family: 'Inter', sans-serif;
        background: #121212;
        color: #eee;
        padding: 20px;
    }

    .card {
        display: flex;
        gap: 20px;

        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 10px;

        padding: 20px;
        max-width: 700px;
    }

    .card img {
        width: 200px;
        height: auto;
        object-fit: contain;
        border: 2px solid #444444;
        border-radius: 8px;
    }

    .card-info {
        flex: 1;
    }
    
    .unit-portrait {
        width: 200px;
        height: auto;
        object-fit: contain;
    }

    .unit-name {
        font-size: 28px;
        font-weight: bold;
        margin-bottom: 10px;
    }
    
    .portrait {
        display: flex;
        align-items: center;
        justify-content: center;

        border-radius: 10px;

        background: #222;   /* fallback */
    }
    
    .portrait.ssr {
        background: linear-gradient(
            135deg,
            rgb(255, 236, 70),
            #1a1a1a 60%
        );
    }

    .portrait.sr {
        background: linear-gradient(
            135deg,
            rgba(191, 31, 255, 0.842),
            #1a1a1a 60%
     );
    }

    .portrait.r {
        background: linear-gradient(
            135deg,
            rgba(49, 172, 255, 0.884),
            #1a1a1a 60%
        );
    }


    .info-row {
      margin-bottom: 6px;
      color: #ccc;
    }

    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 4px;
      background: #333;
      margin-right: 5px;
      font-size: 12px;
    }

    .badge.ssr {
      background: #d4af37;
      color: black;
    }

    .badge.sr {
      background: #9b59b6;
    }

    .badge.r {
      background: #3498db;
    }

    .section {
      margin-top: 20px;
      background: #1a1a1a;
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #333;
    }

    .section-title {
      font-weight: bold;
      margin-bottom: 8px;
      color: #ffcc00;
    }

    button {
      margin-top: 20px;
      padding: 6px 12px;
      background: #2a2a2a;
      color: #eee;
      border: 1px solid #555;
      border-radius: 6px;
      cursor: pointer;
    }

  </style>
</head>
<body>

<button onclick="window.history.back()">← Back</button>

<div id="unitCard"></div>

<script>
fetch('nikke.json')
  .then(res => res.json())
  .then(data => {

    const params = new URLSearchParams(window.location.search);
    const name = params.get("name");

    const unit = data.find(u => u.nikkeName === name);

    if (!unit) {
      document.getElementById("unitCard").innerHTML = "<h2>Unit not found</h2>";
      return;
    }

    const rarityClass = unit.nikkeRarity.toLowerCase();

    document.getElementById("unitCard").innerHTML = `
      <div class="card">
        <div class="portrait ${rarityClass}">
          <img class="unit-portrait" src="${unit.nikkePortrait}" alt="${unit.nikkeName}">
        </div>

        <div class="card-info">

          <div class="unit-name">${unit.nikkeName}</div>

          <div class="info-row">
            <span class="badge ${rarityClass}">${unit.nikkeRarity}</span>
            ${unit.nikkeManufacturer}
          </div>

          <div class="info-row">
            Element: ${unit.nikkeElement}
          </div>

          <div class="info-row">
            Weapon: ${unit.nikkeWeapon}
          </div>

          <div class="info-row">
            Burst: ${unit.nikkeBurst}
          </div>

        </div>
      </div>

      <div class="section">
        <div class="section-title">Notes</div>
        <div>Coming soon...</div>
      </div>
    `;
  });
</script>

</body>
</html>
