
<!DOCTYPE html>
<html>
<head>
  <title>Unit Details</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">

  <style>
    body {
        font-family: 'Inter', sans-serif;
        background: #121212;
        color: #eee;
        padding: 20px;
    }

    .card {
        display: flex;
        gap: 20px;

        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 10px;

        padding: 20px;
        max-width: 700px;
    }

    .card img {
        width: 200px;
        height: auto;
        object-fit: contain;
        border: 2px solid #444444;
        border-radius: 8px;
    }

    .card-info {
        flex: 1;
    }
    
    .unit-portrait {
        width: 200px;
        height: auto;
        object-fit: contain;
    }

    .unit-name {
        font-size: 28px;
        font-weight: bold;
        margin-bottom: 10px;
    }
    
    .portrait {
        display: flex;
        align-items: center;
        justify-content: center;

        border-radius: 10px;

        background: #222;   /* fallback */
    }
    
    .portrait.ssr {
        background: linear-gradient(
            135deg,
            rgb(255, 236, 70),
            #1a1a1a 60%
        );
    }

    .portrait.sr {
        background: linear-gradient(
            135deg,
            rgba(191, 31, 255, 0.842),
            #1a1a1a 60%
     );
    }

    .portrait.r {
        background: linear-gradient(
            135deg,
            rgba(49, 172, 255, 0.884),
            #1a1a1a 60%
        );
    }


    .info-row {
      margin-bottom: 6px;
      color: #ccc;
    }

    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 4px;
      background: #333;
      margin-right: 5px;
      font-size: 12px;
    }

    .badge.ssr {
      background: #d4af37;
      color: black;
    }

    .badge.sr {
      background: #9b59b6;
    }

    .badge.r {
      background: #3498db;
    }

    .section {
      margin-top: 20px;
      background: #1a1a1a;
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #333;
    }

    .section-title {
      font-weight: bold;
      margin-bottom: 8px;
      color: #ffcc00;
    }

    button {
      margin-top: 20px;
      padding: 6px 12px;
      background: #2a2a2a;
      color: #eee;
      border: 1px solid #555;
      border-radius: 6px;
      cursor: pointer;
    }

    .skill-card {
      background: #222;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .skill-header {
      font-weight: bold;
      color: #ffcc00;
      margin-bottom: 6px;
    }

    .skill-level {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .skill-desc {
      color: #ddd;
      line-height: 1.4;
    }

    .level-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 5px;
    }

    .lvl-btn {
      background: #2a2a2a;
      color: #eee;
      border: 1px solid #555;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      padding: 4px 10px;
    }

    .lvl-btn:hover {
      background: #3a3a3a;
    }

    .lvl-btn.active {
      background: #ffcc00;
      color: black;
      border-color: #ffcc00;
      font-weight: bold;
    }

    .lvl-display {
      min-width: 70px;
      text-align: center;
      font-weight: bold;
      color: #ffcc00;
    }

  </style>
</head>
<body>

<button onclick="window.history.back()">← Back</button>

<div id="unitCard"></div>

<script>
function formatSkillDescription(skill, level) {
    let desc = skill.description;

    Object.entries(skill.values).forEach(([key, value]) => {
      let replacement;

      if (Array.isArray(value)) {
        replacement = value[level - 1];
      } else {
        replacement = value;
      }

      desc = desc.replaceAll(`{${key}}`, replacement);
    });

    return desc.replace(/\n/g, "<br>");
}

function renderSkills(skills) {
  const container = document.getElementById("skillsContainer");

  skills.forEach(skill => {
    let level = 1;

    const card = document.createElement("div");
    card.className = "skill-card";

// UPDATE FUNCTION

    function update() {
      const desc = formatSkillDescription(skill, level);

      card.innerHTML = `
        <div class="skill-header">
          <strong>${skill.name}</strong> (${skill.skillType})
          ${skill.cooldown > 0 ? ` - CD: ${skill.cooldown}s` : ""}
        </div>

        <div class="skill-level">
          <button class="lvl-btn" data-action="decrease">−</button>
          <span class="lvl-display">${level}</span>
          <button class="lvl-btn" data-action="increase">+</button>
        </div>

        <div class="skill-desc">${desc}</div>
      `;



      const btns = card.querySelectorAll(".lvl-btn");

      btns.forEach(btn => {
        btn.addEventListener("click", () => {
          const action = btn.dataset.action;

          if (action === "increase" && level < 10) {
            level++;
          }

          if (action === "decrease" && level > 1) {
            level--;
          }

          update();
        });
      });
    }

    update();
    container.appendChild(card);
  });
}

fetch('nikke.json')
  .then(res => res.json())
  .then(data => {

    const params = new URLSearchParams(window.location.search);
    const name = params.get("name");

    const unit = data.find(u => u.nikkeName === name);

    if (!unit) {
      document.getElementById("unitCard").innerHTML = "<h2>Unit not found</h2>";
      return;
    }

fetch('nikke_skills.json')
  .then(res => res.json())
  .then(skillData => {
    const skillUnit = skillData.find(s => s.nikkeName === unit.nikkeName);

    if (!skillUnit) return;

    renderSkills(skillUnit.skills);
  });

    const rarityClass = unit.nikkeRarity.toLowerCase();

    document.getElementById("unitCard").innerHTML = `
      <div class="card">
        <div class="portrait ${rarityClass}">
          <img class="unit-portrait" src="${unit.nikkePortrait}" alt="${unit.nikkeName}">
        </div>

        <div class="card-info">

          <div class="unit-name">${unit.nikkeName}</div>

          <div class="info-row">
            <span class="badge ${rarityClass}">${unit.nikkeRarity}</span>
            ${unit.nikkeManufacturer}
          </div>

          <div class="info-row">
            Element: ${unit.nikkeElement}
          </div>

          <div class="info-row">
            Weapon: ${unit.nikkeWeapon}
          </div>

          <div class="info-row">
            Burst: ${unit.nikkeBurst}
          </div>

        </div>
      </div>

      <div class="section">
        <div class="section-title">Notes</div>
        <div>Coming soon...</div>
      </div>

      <div class="section">
        <div class="section-title">Skills</div>
        <div id="skillsContainer"></div>
      </div>
    `;
  });
</script>

</body>
</html>
