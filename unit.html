
<!DOCTYPE html>
<html>
<head>
  <title>Nikkepedia</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <style>
    body {
        font-family: 'Inter', sans-serif;
        background: #121212;
        color: #eee;
        padding: 20px;
    }

    .card {
        display: flex;
        gap: 20px;

        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 10px;

        padding: 20px;
        max-width: 700px;
    }

    .card img {
        width: 200px;
        height: auto;
        object-fit: contain;
        border: 2px solid #444444;
        border-radius: 8px;
    }

    .card-info {
        flex: 1;
    }
    
    .unit-portrait {
        width: 200px;
        height: auto;

    .unit-name {
        font-size: 28px;

    .portrait {

    .portrait.sr {

            135deg,
            rgba(191, 31, 255, 0.842),
            #1a1a1a 60%
     );
    }

    .portrait.r {
        background: linear-gradient(
            135deg,
            rgba(49, 172, 255, 0.884),
            #1a1a1a 60%
        );
    }


    .info-row {
      margin-bottom: 6px;
      color: #ccc;
    }

    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 4px;
      background: #333;
      margin-right: 5px;
      font-size: 12px;
    }

    .badge.ssr {
      background: #d4af37;
      color: black;
    }

    .badge.sr {
      background: #9b59b6;
    }

    .badge.r {
      background: #3498db;
    }

    .section {
      margin-top: 20px;
      background: #1a1a1a;
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #333;
    }

    .section-title {
      font-weight: bold;
      margin-bottom: 8px;
      color: #ffcc00;
    }

    body > button {
      margin-top: 20px;
      padding: 6px 12px;
      background: #2a2a2a;
      color: #eee;
      border: 1px solid #555;
      border-radius: 6px;
      cursor: pointer;
    }

    .skill-card {
      background: #222;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      flex: 1 1 calc (33.33% - 8px);
      min-width: 250px;
    }

    .skill-header {
      font-weight: bold;
      color: #ffcc00;
      margin-bottom: 6px;
    }

    .skill-level {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .skill-desc {
      color: #ddd;
      line-height: 1.4;
    }

    .level-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 5px;
    }

    .lvl-btn {
      background: #2a2a2a;
      color: #eee;
      border: 1px solid #555;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      padding: 4px 10px;
      flex: 0 0 40px;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 30px;
    }

    .lvl-btn:hover {
      background: #3a3a3a;
    }

    .lvl-btn.active {
      background: #ffcc00;
      color: black;
      border-color: #ffcc00;
      font-weight: bold;
    }

    .lvl-btn[data-action="min"]:hover,
    .lvl-btn[data-action="max"]:hover {
      background: #333;
    }

    .lvl-display {
      min-width: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 30px;
      text-align: center;
      font-weight: bold;
      color: #ffcc00;
    }

    .skill-toggle-buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    .toggle-btn {
      padding: 8px 24px;
      background: #2a2a2a;
      color: #ddd;
      border: 1px solid #555;
      border-radius: 6px;
      cursor: pointer;
    }

    .toggle-btn:hover {
      background: #3a3a3a;
    }

    .toggle-btn.active {
      background: #ffcc00;
      color: black;
      border-color: #ffcc00;
      font-weight: bold;
    }

    
    .material-icons {
      font-size: 18px;
      line-height: 1;
      vertical-align: middle;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #skillsContainer {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .txt-blue {
      color: #2ba6f8;
    }

    .txt-orange {
      color: #ff9933;
      cursor: pointer;
    }
    
    .txt-white {
      color: #eee;
    }

    #tooltip {
      position: fixed;
      pointer-events: none;
      background: #222;
      color: #fff;
      border: 1px solid #555;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 12px;
      width: 300px;
      max-width: 400px;
      z-index: 1000;
      line-height: 1.4;
      display: none;
    }


  </style>
</head>
<body>

<button onclick="window.history.back()">← Back</button>

<div id="unitCard"></div>

<script>

let skillMode = "normal"; // "normal" or "treasure"

function renderSkillToggle(hasTreasure, skillUnit) {
  const toggleDiv = document.getElementById("skillToggle");

  if (!skillUnit) return;

  if (!hasTreasure) {
    toggleDiv.innerHTML = "";
    renderSkills(skillUnit.skills);
    return;
  }

  toggleDiv.innerHTML = `
    <div class="skill-toggle-buttons">
      <button class="toggle-btn ${skillMode === "normal" ? "active" : ""}" data-mode="normal">
        Normal
      </button>
      <button class="toggle-btn ${skillMode === "treasure" ? "active" : ""}" data-mode="treasure">
        Treasure
      </button>
    </div>
  `;

  const buttons = toggleDiv.querySelectorAll(".toggle-btn");

  buttons.forEach(btn => {
    btn.addEventListener("click", () => {
      if (skillMode === btn.dataset.mode) return;

      skillMode = btn.dataset.mode;
      renderSkillToggle(true, skillUnit);
    });
  });

  renderSkills(
    skillMode === "normal"
      ? skillUnit.skills
      : skillUnit.treasureSkills
  );
}

function applyColorTags(text) {
  const colors = ["blue", "orange", "white"];

  colors.forEach(color => {
    const open = new RegExp(`\\{${color}(?:\\|([^}]+))?\\}`, "gi");
    const close = new RegExp(`\\{\\/${color}\\}`, "gi");

    text = text.replace(open, (match, term) => {
      const dataTerm = term
        ? ` data-term="${term.trim().toLowerCase()}"`
        : "";

      return `<span class="txt-${color}"${dataTerm}>`;
    });

    text = text.replace(close, `</span>`);
  });

  return text;
}



function formatSkillDescription(skill, level) {
    let desc = skill.description;

    Object.entries(skill.values).forEach(([key, value]) => {
      let replacement;

      if (Array.isArray(value)) {
        replacement = value[level - 1];
      } else {
        replacement = value;
      }

      desc = desc.replaceAll(`{${key}}`, replacement);
    });

    // applies colors to skill text
    desc = applyColorTags(desc)

    // adds line breaks where \n is placed
    desc = desc.replace(/\n/g, "<br>")

    return desc;
}

function renderSkills(skills) {
    const container = document.getElementById("skillsContainer");
    container.innerHTML = "";
    skills.forEach(skill => {
      let level = 1;

      const card = document.createElement("div");
      card.className = "skill-card";

// UPDATE FUNCTION

    function update() {
      const desc = formatSkillDescription(skill, level);

      card.innerHTML = `
        <div class="skill-header">
          <strong>${skill.name}</strong> (${skill.skillType})
          ${skill.cooldown > 0 ? ` - CD: ${skill.cooldown}s` : ""}
        </div>
        
        <div class="skill-level">
          <button class="lvl-btn" data-action="min">
            <span class="material-icons">first_page</span>
          </button>

          <button class="lvl-btn" data-action="decrease">
            <span class="material-icons">remove</span>
          </button>

          <span class="lvl-display">${level}</span>

          <button class="lvl-btn" data-action="increase">
            <span class="material-icons">add</span>
          </button>

          <button class="lvl-btn" data-action="max">
            <span class="material-icons">last_page</span>
          </button>
        </div>

        <div class="skill-desc">${desc}</div>
      `;

      const btns = card.querySelectorAll(".lvl-btn");

      btns.forEach(btn => {
        btn.addEventListener("click", () => {
          const action = btn.dataset.action;

          if (action === "increase" && level < 10) {
            level++;
          }

          if (action === "decrease" && level > 1) {
            level--;
          }

          if (action === "min") {
            level = 1;
          }

          if (action === "max") {
            level = 10;
          }

          update();
        });
      });
    }

    update();
    container.appendChild(card);
  });
}

let tooltipData = {};
let tooltipTimer = null;

function getTooltipText(term) {
  const entry = tooltipData[term];

  if (!entry) return null;

  if (typeof entry === "string") {
    return entry;
  }

  return entry.description;
}

function formatTooltipText(text) {
  text = applyColorTags(text);
  text = text.replace(/\n/g, "<br>");
  return text;
}

function positionTooltip(e) {
    const tooltip = document.getElementById("tooltip");
    const padding = 10;

    const tooltipWidth = tooltip.offsetWidth;
    const tooltipHeight = tooltip.offsetHeight;

    let x = e.clientX + padding;
    let y = e.clientY + padding;

    if (x + tooltipWidth > window.innerWidth) {
      x = e.clientX - tooltipWidth - padding;
    }

    if (y + tooltipHeight > window.innerHeight) {
      y = e.clientY - tooltipHeight - padding;
    }

    tooltip.style.left = x + "px";
    tooltip.style.top = y + "px";
  }

  document.addEventListener("mouseover", (e) => {
  const target = e.target.closest(".txt-orange");

  if (!target) return;

  const tooltip = document.getElementById("tooltip");

  const rawText = target.textContent;
  const term = rawText.trim();

  const hasKey = Object.prototype.hasOwnProperty.call(tooltipData, term);
  const tooltipText = tooltipData[term]?.description;

  clearTimeout(tooltipTimer);

  tooltipTimer = setTimeout(() => {

    /* DEBUG OUTPUT
    console.log("---- TOOLTIP DEBUG ----");
    console.log("RAW TEXT:", JSON.stringify(rawText));
    console.log("TERM:", JSON.stringify(term));
    console.log("MATCH FOUND:", hasKey);
    console.log("AVAILABLE KEYS:", Object.keys(tooltipData));
    */
    if (!hasKey) {
      tooltip.innerHTML = `
        <div style="color:red;font-weight:bold;">NO MATCH</div>
        <div><b>Seen:</b> ${rawText}</div>
        <div><b>Trimmed:</b> ${term}</div>
      `;
      tooltip.style.display = "block";
      positionTooltip(e);
      return;
    }

    let text = tooltipText;

    text = formatTooltipText(text);

    tooltip.innerHTML = text;
    tooltip.style.display = "block";
    positionTooltip(e);

  }, 150);
});

document.addEventListener("mousemove", (e) => {
  const tooltip = document.getElementById("tooltip");

  if (tooltip.style.display === "block") {
    positionTooltip(e);
  }
});

document.addEventListener("mouseout", (e) => {
  const target = e.target.closest(".txt-orange");

  if (!target) return;

  clearTimeout(tooltipTimer);

  const tooltip = document.getElementById("tooltip");
  tooltip.style.display = "none";
});


fetch('nikke_tooltips.json')
  .then(res => res.json())
  .then(data => {
    tooltipData = data;
  });

fetch('nikke.json')
  .then(res => res.json())
  .then(data => {

    const params = new URLSearchParams(window.location.search);
    const name = params.get("name");

    const unit = data.find(u => u.nikkeName === name);

    if (!unit) {
      document.getElementById("unitCard").innerHTML = "<h2>Unit not found</h2>";
      return;
    }

fetch('nikke_skills.json')
  .then(res => res.json())
  .then(skillData => {
    const skillUnit = skillData.find(s => s.nikkeName === unit.nikkeName);
    const hasTreasure = !!skillUnit.treasureSkills;
    renderSkillToggle(hasTreasure, skillUnit);

    if (!skillUnit) return;
  });

    const rarityClass = unit.nikkeRarity.toLowerCase();

    document.getElementById("unitCard").innerHTML = `
      <div class="card">
        <div class="portrait ${rarityClass}">
          <img class="unit-portrait" src="${unit.nikkePortrait}" alt="${unit.nikkeName}">
        </div>

        <div class="card-info">

          <div class="unit-name">${unit.nikkeName}</div>

          <div class="info-row">
            <span class="badge ${rarityClass}">${unit.nikkeRarity}</span>
            ${unit.nikkeManufacturer}
          </div>

          <div class="info-row">
            Element: ${unit.nikkeElement}
          </div>

          <div class="info-row">
            Weapon: ${unit.nikkeWeapon}
          </div>

          <div class="info-row">
            Burst: ${unit.nikkeBurst}
          </div>

        </div>
      </div>

      <div class="section">
        <div class="section-title">Notes</div>
        <div>Coming soon...</div>
      </div>

      <div class="section">
        <div class="section-title">Skills</div>
        <div id="skillToggle"></div>
        <div id="skillsContainer"></div>
      </div>
    `;
  });
</script>
