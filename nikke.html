
<!DOCTYPE html>
<html>
<head>
  <title>Nikkepedia</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
  <style>
    body {
        font-family: Arial;
        background: #121212;
        color: #eee;
        padding: 20px;
    }

    h1 {
        color: #ffcc00;
        margin-top: 0;
        margin-bottom: 15px;
    }

    a {
        color: #ffcc00;
        margin-right: 10px;
        text-decoration: none;
    }

    nav {
        margin-bottom: 15px;
    }
    
    .control-row {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 15px;
    }

    /* ===== FILTER BUTTONS ===== */
    .filters {
        margin-bottom: 20px;
        display: flex;
        flex-direction: column;
        flex-wrap: wrap;
        gap: 8px;
    }

    .filter-group {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .filter-button {
        width: 48px; 
        height: 48px;
        padding: 4px;
        display: inline-flex;
        justify-content: center;
        align-items: center;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 6px;
        cursor: pointer;
    }

    .filter-button:hover {
        border-color: #555;
        background: #222;
    }

    .filter-button.active {
        background: #ffcc00;
        color: black;
        font-weight: bold;
    }

    .icon-stack {
        position: absolute;
        top: -8px;
        left: -4px;

        display: flex;
        flex-direction: column;
        gap: 6px;

        z-index: 2;
    }
    
    .icon-stack img {
        width: 22px;
        height: auto;
        object-fit: contain;
    }

    /* ===== UNIT GRID ===== */
    .unit-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 20px;
    }

    .unit-card {
        position: relative;
        height: 150px;
        display: flex;
        flex-direction: column;
        align-items: center;
        background: #1a1a1a;
        padding: 6px;
        border-radius: 6px;
        border: 1px solid #2a2a2a;
        cursor: pointer;
    }



    .unit-image img {
        width: 90px;
        height: 90px;
        object-fit: contain;
        border-radius: 4px;
        transition: transform 0.5s ease;
    }
    
    .unit-card:hover .unit-image img {
        transform: scale(1.1);
    }

    .unit-name {
        font-family: 'Inter', sans-serif;
        height: 50px;
        display: flex;
        justify-content: center;
        text-align: center;
        font-size: 15px;
        line-height: 1.1;
        padding-top: 10px;
    }

    .unit-image {
        height: 90px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    
    .unit-image img {
        width: 90px;
        height: 90px;
        object-fit: contain;
        transition: transform 0.3s ease;
    }

    .unit-card:hover .unit-image img {
        transform: scale(1.10);
    }

    .element-button {
        padding: 8px;
        width: 40px;
        height: 40px;
        display: inline-flex;
        justify-content: center;
        align-items: center;
    }

    .element-button.active {
        border-color: #ffcc00;
        background: #2a2a2a;
    }

    
    .rarity-button {
        width: 60px;
        height: 36px;
        padding: 4px;
        display: inline-flex;
        justify-content: center;
        align-items: center;
    }

    .rarity-button.active {
        border-color: #ffcc00;
        background: #2a2a2a;
    }

    .weapon-button {
        width: 40px;
        height: 40px;
        padding: 4px;
        display: inline-flex;
        justify-content: center;
        align-items: center;
    }

    .weapon-button.active {
        border-color: #ffcc00;
        background: #2a2a2a;
    }

     /* SSR (gold tint) */
    .rarity-ssr {
    background: linear-gradient(
        300deg,
        #1a1a1a 20%,
        rgba(212, 175, 55, 0.712)
        );
    }
    /* SR (purple tint) */
    .rarity-sr {
    background: linear-gradient(
        300deg,
        #1a1a1a 20%,
        rgba(156, 89, 182, 0.719)
        );
    }
    /* R (blue tint) */
    .rarity-r {
        background: linear-gradient(
        300deg,
        #1a1a1a 20%,
        rgba(52, 152, 219, 0.781)
        );
    }

    .rarity-button img {
        max-width: 36px;
        max-height: 22px;
    }

    .burst-button {
        max-width: 40px;
        max-height: 40px;
        padding: 4px;
        display: inline-flex;
        justify-content: center;
        align-items: center;
    }

    .burst-button.active {
        border-color: #ffcc00;
        background: #2a2a2a;
    }

    .filter-button img {
        max-width: 28px;
        max-height: 28px;
        object-fit: contain;
    }

    .manufacturer-button {
        width: 60px;
        height: 40px;
        padding: 4px;

        display: inline-flex;
        justify-content: center;
        align-items: center;
    }

    .manufacturer-button img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
    }

    .search-box {
        margin-bottom: 15px;
    }

    .search-box input {
        width: 250px;
        padding: 8px 10px;

        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 6px;

        color: #eee;
        font-size: 14px;
    }

    .search-box input:focus {
        outline: none;
        border-color: #ffcc00;
    }

    .filter-card {
        border: 1px solid #333;
        border-radius: 8px;
        margin-bottom: 15px;
        background: #181818;
        overflow: hidden;
    }

    .filter-header {
        padding: 10px;
        background: #202020;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;

        font-weight: bold;
        color: #ffffff;
    }

    .filter-content {
        max-height: 0;
        padding: 0 10px;
        overflow: hidden;
        opacity: 0;
        transition: max-height 0.3s ease, opacity 0.3s ease;
    }

    .filter-content.open {
        max-height: 500px;
        opacity: 1;
        padding: 10px;
    }
    
    #filterToggleIcon {
        transition: transform 0.3s ease;
        display: inline-block;
    }


  </style>
</head>

<body>

<nav>
    <a href="index.html">Overview</a>|
    <a href="raid.html">Union Raid</a>|
    <a href="player.html">Players</a>|
    <a href="boss.html">Bosses</a>|
    <a href="leaderboard.html">Leaderboard</a>|
    <a href="nikke.html">Nikkepedia</a>
</nav>

<h1>Nikkepedia</h1>

<!-- FILTERS -->
<div class="filter-card">

  <div class="filter-header" onclick="toggleFilters()">
    <span>Filters</span>
    <span id="filterToggleIcon">▲</span>
  </div>

  <div id="filters" class="filter-content"></div>

</div>


<div class="search-box">
    <input type="text" id="searchInput" placeholder="Search">
</div>


<!-- UNIT LIST -->
<div id="unitGrid" class="unit-grid"></div>

<script>

// ===== GLOBAL STATE =====
let units = [];
let activeFilters = {
    nikkeElement: [],
    nikkeBurst: [],
    nikkeRarity: [],
    nikkeWeapon: [],
    nikkeManufacturer: []
};
let currentSort = 'name';
let searchQuery = '';
let filtersOpen = false;

function toggleFilters() {
    filtersOpen = !filtersOpen;

    const content = document.getElementById("filters");
    const icon = document.getElementById("filterToggleIcon");

    if (filtersOpen) {
        content.classList.add("open");
        icon.style.transform = "rotate(180deg)";
    } else {
        content.classList.remove("open");
        icon.style.transform = "rotate(0deg)";
    }
}

function toggleFilter(group, value) {
    value = String(value);

    const list = activeFilters[group];
    const index = list.indexOf(value);

    if (index >= 0) {
        list.splice(index, 1);
    } else {
        list.push(value);
    }

    updateFilterUI();
    renderUnits();
}

const weaponMap = {
    "Assault Rifle": "ar",
    "Minigun": "mg",
    "SMG": "smg",
    "Sniper Rifle": "sr",
    "Shotgun": "sg",
    "Rocket Launcher": "rl"
};

const manufacturerOrder = [
    "Elysion",
    "Missilis",
    "Tetra",
    "Pilgrim",
    "Abnormal"
];

const rarityOrder = ["SSR", "SR", "R"];

// ===== LOAD DATA =====
fetch('nikke.json')
    .then(res => res.json())
    .then(data => {
        units = data;

        buildFilters();
        renderUnits();
    });

document.getElementById("searchInput").addEventListener("input", (e) => {
    searchQuery = e.target.value.trim().toLowerCase();
    renderUnits();
});

document.getElementById("filterToggleIcon").style.transform = "rotate(0deg)";

// ===== BUILD FILTER BUTTONS =====
function buildFilters() {

    const filterDefinitions = {
        nikkeManufacturer: getUnique('nikkeManufacturer'),
        nikkeBurst: getUnique('nikkeBurst'),
        nikkeElement: getUnique('nikkeElement'),
        nikkeWeapon: getUnique('nikkeWeapon'),
        nikkeRarity: getUnique('nikkeRarity')
    };

  let html = '';

  Object.keys(filterDefinitions).forEach(group => {
    html += `<div class="filter-group">`;

    const labelMap = {
        nikkeElement: "Element",
        nikkeBurst: "Burst",
        nikkeRarity: "Rarity",
        nikkeWeapon: "Weapon",
        nikkeManufacturer: "Manufacturer"
        };

    html += `<strong style="margin-right:10px">${labelMap[group]}:</strong>`;


    

let values = filterDefinitions[group];

if (group === "nikkeManufacturer") {
  values = manufacturerOrder.filter(m => values.includes(m));
}

if (group === "nikkeRarity") {
  values = rarityOrder.filter(r => values.includes(r));
}

values.forEach(value => {


  if (group === "nikkeElement") {

    html += `
      <button class="filter-button element-button"
        onclick="toggleFilter('${group}', '${value}')"
        id="filter-${group}-${value}">
        
        <img src="images/elements/ele_${value}.png">

      </button>
    `;

  } else if (group === "nikkeRarity") {

    html += `
      <button class="filter-button rarity-button"
        onclick="toggleFilter('${group}', '${value}')"
        id="filter-${group}-${value}">
        
        <img src="images/rarity/${value.toLowerCase()}.png">

      </button>
    `;

    } 
else if (group === "nikkeWeapon") {

    const normalized = value.trim().toLowerCase();

    const weaponMapNormalized = {
        "assault rifle": "ar",
        "minigun": "mg",
        "smg": "smg",
        "sniper rifle": "sr",
        "shotgun": "sg",
        "rocket launcher": "rl"
    };

    const fileKey = weaponMapNormalized[normalized];

    html += `
        <button class="filter-button weapon-button"
        onclick="toggleFilter('${group}', '${value}')"
        id="filter-${group}-${value}">
        
        <img src="images/weapon/weapon_${fileKey}.png"
            alt="${value}" title="${value}">
        </button>
    `;
    } else if (group === "nikkeBurst") {

        html += `
            <button class="filter-button burst-button"
            onclick="toggleFilter('${group}', '${value}')"
            id="filter-${group}-${value}">

            <img src="images/burst/burst_${value}.png" alt="${value}" title="${value}">

            </button>
        `;

        } else if (group === "nikkeManufacturer") {

        const normalized = value.trim().toLowerCase().replace(/\s+/g, '');

        html += `
            <button class="filter-button manufacturer-button"
            onclick="toggleFilter('${group}', '${value}')"
            id="filter-${group}-${value}">

            <img src="images/manufacturer/${normalized}_icon.png" alt="${value}" title="${value}">

            </button>
        `;

        } else {

            html += `
            <button class="filter-button"
                onclick="toggleFilter('${group}', '${value}')"
                id="filter-${group}-${value}">
                ${value}
            </button>
            `;
        }

});


    html += `</div><br>`;
  });

  document.getElementById("filters").innerHTML = html;
}

// ===== GET UNIQUE VALUES =====
function getUnique(field) {
  return [...new Set(
    units
      .map(u => String(u[field]))
      .filter(v => v)
  )].sort();
}

// ===== UPDATE BUTTON STYLE =====
function updateFilterUI() {

  Object.keys(activeFilters).forEach(group => {
    const values = getUnique(group);

    values.forEach(value => {
      const btn = document.getElementById(`filter-${group}-${value}`);

      if (btn) {
        if (activeFilters[group].includes(String(value))) {
          btn.classList.add("active");
        } else {
          btn.classList.remove("active");
        }
      }
    });
  });
}

// ===== FILTER + RENDER UNITS =====
function renderUnits() {


    const filtered = units.filter(unit => {

    const matchesFilters = Object.keys(activeFilters).every(group => {
        return (
        activeFilters[group].length === 0 ||
        activeFilters[group].includes(String(unit[group]))
        );
    });

    const matchesSearch =
        !searchQuery ||
        unit.nikkeName.toLowerCase().includes(searchQuery) ||
        String(unit.nikkeElement).toLowerCase().includes(searchQuery) ||
        String(unit.nikkeManufacturer).toLowerCase().includes(searchQuery) ||
        String(unit.nikkeWeapon).toLowerCase().includes(searchQuery);

    return matchesFilters && matchesSearch;

    })
    .sort((a, b) => {
            
        const rarityOrder = ["SSR", "SR", "R"];

        const rarityDiff =
            rarityOrder.indexOf(String(a.nikkeRarity)) -
            rarityOrder.indexOf(String(b.nikkeRarity));

        if (rarityDiff !== 0) return rarityDiff;

        // fallback: alphabetical
        return String(a.nikkeName).localeCompare(String(b.nikkeName));
        });

    let html = '';

    filtered.forEach(unit => {

    const rarityClass = `rarity-${String(unit.nikkeRarity).toLowerCase()}`;

        html += `
            <div class="unit-card ${rarityClass}"
            onclick="openUnit('${unit.nikkeName}')">
            
            <div class="icon-stack">
                <img class="unit-icon" src="images/elements/ele_${unit.nikkeElement}.png" alt="${unit.nikkeElement}">
                <img class="unit-icon" src="images/classes/${unit.nikkeType}.png" alt="${unit.nikkeType}">
                <img class="unit-icon" src="images/burst/burst_${unit.nikkeBurst}.png" alt="Burst ${unit.nikkeBurst}">
            </div>

            <div class="unit-image">
                <img src="${unit.nikkeImage}">
            </div>
            <div class="unit-name">${unit.nikkeName}</div>

            </div>
        `;
    });


  document.getElementById("unitGrid").innerHTML = html;
}

// ===== OPEN UNIT PAGE =====
function openUnit(name) {
  window.location.href = `unit.html?name=${encodeURIComponent(name)}`;
}

// ===== SET SORT =====
function setSort(type) {
  currentSort = type;
  renderUnits();
}

</script>

</body>
</html>
